<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Giro d'Italia 2026 — Live Dashboard | Dr Marco Cardinale</title>
<meta name="description" content="Interactive Giro d'Italia 2026 dashboard — live GC, stage results, points, rider profiles and estimated power data.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--pk:#e8185d;--pu:#9b1fe8;--bl:#1864e8;--gr:#18a86b;--or:#e87018;--dk:#1a1a2e;--d2:#16213e;--d3:#0f3460;--cd:#1e2a45;--tx:#e8eaf0;--mu:#8892a4;--bd:#2a3a58;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--dk);color:var(--tx);min-height:100vh;}
.hdr{background:linear-gradient(135deg,var(--pk) 0%,var(--d3) 60%);padding:18px 28px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 20px rgba(232,24,93,.3);}
.hdr-logo{font-size:38px;}
.hdr h1{font-size:24px;font-weight:800;letter-spacing:-.5px;}
.hdr p{color:rgba(255,255,255,.7);font-size:12px;margin-top:2px;}
.hdr-r{margin-left:auto;text-align:right;}
.live-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.3);display:inline-block;}
.updated{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;}
.nav{background:var(--d2);border-bottom:1px solid var(--bd);display:flex;padding:0 20px;gap:2px;overflow-x:auto;}
.tab{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--mu);transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--tx);}
.tab.active{color:var(--pk);border-bottom-color:var(--pk);}
.content{padding:20px 28px;max-width:1440px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-bottom:20px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.kpi{background:var(--cd);border-radius:12px;padding:16px;border:1px solid var(--bd);position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--pk));}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:5px;}
.kpi-val{font-size:24px;font-weight:800;}
.kpi-sub{font-size:11px;color:var(--mu);margin-top:3px;}
.kpi-ico{position:absolute;top:12px;right:12px;font-size:24px;opacity:.15;}
.card{background:var(--cd);border-radius:12px;padding:20px;border:1px solid var(--bd);}
.card h3{font-size:15px;font-weight:700;margin-bottom:3px;}
.card .sub{font-size:11px;color:var(--mu);margin-bottom:16px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--d2);padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);font-weight:700;border-bottom:1px solid var(--bd);}
td{padding:8px 10px;border-bottom:1px solid rgba(42,58,88,.4);}
tr:hover td{background:rgba(255,255,255,.02);}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;text-transform:uppercase;}
.b-pk{background:rgba(232,24,93,.18);color:var(--pk);border:1px solid rgba(232,24,93,.3);}
.b-pu{background:rgba(155,31,232,.18);color:#bf7aff;border:1px solid rgba(155,31,232,.3);}
.b-gr{background:rgba(24,168,107,.18);color:#5de0a0;border:1px solid rgba(24,168,107,.3);}
.b-bl{background:rgba(24,100,232,.18);color:#7ab4ff;border:1px solid rgba(24,100,232,.3);}
.b-or{background:rgba(232,112,24,.18);color:#ffaa5a;border:1px solid rgba(232,112,24,.3);}
.b-gy{background:rgba(136,146,164,.12);color:var(--mu);}
.stt{font-size:10px;padding:2px 5px;border-radius:3px;font-weight:600;}
.t-sprint{background:rgba(24,168,107,.2);color:#5de0a0;}
.t-mountain{background:rgba(232,24,93,.2);color:var(--pk);}
.t-tt{background:rgba(24,100,232,.2);color:#7ab4ff;}
.t-hilly{background:rgba(232,112,24,.2);color:#ffaa5a;}
.gc-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(42,58,88,.35);}
.gc-row:last-child{border-bottom:none;}
.gc-rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.gc-name{flex:1;}
.gc-name strong{font-size:13px;}
.gc-name small{display:block;font-size:11px;color:var(--mu);}
.gc-gap{font-size:13px;font-weight:700;white-space:nowrap;}
/* RIDER CARDS */
.rider-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.r-card{background:var(--cd);border-radius:12px;padding:16px;border:1px solid var(--bd);transition:border-color .2s;}
.r-card:hover{border-color:var(--pk);}
.r-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.r-av{width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;}
.r-av img{width:100%;height:100%;object-fit:cover;}
.r-name{font-size:14px;font-weight:700;}
.r-team{font-size:11px;color:var(--mu);margin-top:2px;}
.r-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.r-stat{background:var(--d2);border-radius:7px;padding:6px 8px;}
.r-stat-l{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;}
.r-stat-v{font-size:13px;font-weight:700;margin-top:2px;}
.r-tours{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);font-size:12px;}
.r-tours-l{font-size:10px;color:var(--mu);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.note{background:rgba(155,31,232,.1);border:1px solid rgba(155,31,232,.3);border-radius:7px;padding:9px 13px;font-size:12px;color:#bf7aff;margin-bottom:16px;}
.filter-bar{background:var(--cd);border-radius:9px;padding:12px 16px;border:1px solid var(--bd);margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.filter-bar label{font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;}
.filter-bar select,.filter-bar input{background:var(--d2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);padding:6px 10px;font-size:12px;}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--pk);}
.tw{overflow-x:auto;}
.sec{font-size:16px;font-weight:800;margin-bottom:13px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--bd);}
.est{font-size:9px;color:var(--mu);font-style:italic;vertical-align:super;}
.loading{text-align:center;padding:60px;color:var(--mu);font-size:15px;}
/* MULTI-SELECT RIDER PICKER */
.rider-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.rider-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--d2);color:var(--mu);transition:all .2s;user-select:none;}
.rider-pill:hover{border-color:var(--mu);}
.rider-pill.selected{color:#fff;border-color:transparent;}
.picker-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:700;}
.picker-note{font-size:11px;color:var(--mu);margin-left:6px;}
/* WP CODE */
.wp-box{background:var(--d2);border:1px solid var(--bd);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;color:#a8d8a0;max-height:260px;overflow-y:auto;}
.cp-btn{background:var(--cd);border:1px solid var(--bd);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--tx);cursor:pointer;margin-top:8px;}
.cp-btn:hover{background:var(--d2);}
@media(max-width:768px){.g4{grid-template-columns:repeat(2,1fr);}.g2,.g3{grid-template-columns:1fr;}.content{padding:14px;}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">🚴</div>
  <div>
    <h1>Giro d'Italia 2026</h1>
    <p>109th Edition · 8–31 May 2026 · 3,468 km · Dr Marco Cardinale</p>
  </div>
  <div class="hdr-r">
    <div class="live-badge" id="stageBadge">Loading…</div>
    <div class="updated" id="lastUpdated"></div>
  </div>
</div>
<div class="nav">
  <div class="tab active" onclick="showPage('overview',this)">📊 Overview</div>
  <div class="tab" onclick="showPage('stages',this)">🏁 Stages</div>
  <div class="tab" onclick="showPage('gc',this)">🌸 GC Evolution</div>
  <div class="tab" onclick="showPage('points',this)">💜 Points</div>
  <div class="tab" onclick="showPage('riders',this)">👤 Riders</div>
  <div class="tab" onclick="showPage('power',this)">⚡ Power (Est.)</div>
  <div class="tab" onclick="showPage('wordpress',this)">📝 WordPress</div>
</div>
<div class="content">
  <div id="page-overview"  class="page active"><div class="loading">⏳ Loading race data…</div></div>
  <div id="page-stages"    class="page"></div>
  <div id="page-gc"        class="page"></div>
  <div id="page-points"    class="page"></div>
  <div id="page-riders"    class="page"></div>
  <div id="page-power"     class="page"></div>
  <div id="page-wordpress" class="page"></div>
</div>

<script>
let D=null;
let RIDERS=[];
const COLORS=['#e8185d','#3498db','#9b59b6','#2ecc71','#e67e22','#1abc9c','#f39c12','#e74c3c','#16a085','#8e44ad','#2980b9','#27ae60','#d35400','#c0392b','#7f8c8d'];
const TYPE_CLS={sprint:'t-sprint',mountain:'t-mountain',tt:'t-tt',hilly:'t-hilly'};
let charts={};
const rendered=new Set();

// ── NAV ──
function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el) el.classList.add('active');
  if(!rendered.has(id)){rendered.add(id);({overview:renderOverview,stages:renderStages,gc:renderGC,points:renderPoints,riders:renderRiders,power:renderPower,wordpress:renderWordPress}[id]||function(){})();}
}

// ── LOAD ──
async function loadData(){
  try{
    const [raceRes, ridersRes] = await Promise.all([
      fetch('data.json?v='+Date.now()),
      fetch('riders.json?v='+Date.now())
    ]);
    D=await raceRes.json();
    RIDERS=await ridersRes.json();
    const isLive = D.race.raceStatus === 'LIVE';
    const isComplete = D.race.raceComplete;
    document.getElementById('stageBadge').textContent = isComplete
      ? `🏆 RACE COMPLETE — ${D.race.completedStages} Stages`
      : isLive
      ? `🔴 LIVE — Stage 21 Roma · Final stage`
      : `Stage ${D.race.completedStages} of ${D.race.totalStages} Complete`;
    document.getElementById('stageBadge').style.background = isLive ? 'rgba(232,24,93,0.4)' : '';
    document.getElementById('lastUpdated').textContent=`Updated: ${D.race.lastUpdated}`;
    renderOverview();
  }catch(e){
    document.getElementById('page-overview').innerHTML=`<div class="loading" style="color:var(--pk)">❌ Could not load data<br><small>${e}</small></div>`;
  }
}

function stBadge(t){return `<span class="stt ${TYPE_CLS[t]||''}">${(t||'').toUpperCase()}</span>`;}
function secToMin(s){if(!s&&s!==0)return '—';const m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec;}

// ── OVERVIEW ──
function renderOverview(){
  const done=D.stages.filter(s=>s.winner);
  const teams={};
  done.forEach(s=>{if(s.winTeam)teams[s.winTeam]=(teams[s.winTeam]||0)+1;});
  const sorted=Object.entries(teams).sort((a,b)=>b[1]-a[1]);
  document.getElementById('page-overview').innerHTML=`
    <div class="g4">
      <div class="kpi" style="--ac:var(--pk)"><div class="kpi-ico">🌸</div><div class="kpi-label">GC Leader</div><div class="kpi-val" style="font-size:18px">${D.gcLeader.name}</div><div class="kpi-sub">${D.gcLeader.flag} ${D.gcLeader.team}</div></div>
      <div class="kpi" style="--ac:var(--pu)"><div class="kpi-ico">💜</div><div class="kpi-label">Points Leader</div><div class="kpi-val" style="font-size:18px">${D.pointsLeader.name}</div><div class="kpi-sub">${D.pointsLeader.flag} ${D.pointsLeader.team}</div></div>
      <div class="kpi" style="--ac:var(--bl)"><div class="kpi-ico">🏁</div><div class="kpi-label">Stages Complete</div><div class="kpi-val">${D.race.completedStages}/${D.race.totalStages}</div><div class="kpi-sub">${D.race.totalStages-D.race.completedStages} remaining · Rome 31 May</div></div>
      <div class="kpi" style="--ac:var(--gr)"><div class="kpi-ico">🏆</div><div class="kpi-label">Stage Wins</div><div class="kpi-val">${Object.keys(teams).length} teams</div><div class="kpi-sub">${done.length} stages raced</div></div>
    </div>
    <div class="g2">
      <div class="card">
        <h3>🌸 GC Top 10 After Stage ${D.race.completedStages}</h3><div class="sub">General classification</div>
        ${D.gc.slice(0,10).map((r,i)=>`
          <div class="gc-row">
            <div class="gc-rank" style="background:${i===0?'var(--pk)':'var(--d2)'};color:${i===0?'#fff':'var(--tx)'};">${r.pos}</div>
            <div class="gc-name"><strong>${r.nat} ${r.rider}</strong><small>${r.team}</small></div>
            <div class="gc-gap">${r.timeGap==='Leader'?'<span style="color:var(--pk)">Leader</span>':r.timeGap}</div>
          </div>`).join('')}
      </div>
      <div class="card"><h3>🏆 Stage Wins by Team</h3><div class="sub">All ${D.race.completedStages} completed stages</div><canvas id="teamWinsChart" height="260"></canvas></div>
    </div>
    <div class="sec">All Stages</div>
    <div class="card"><div class="tw"><table>
      <thead><tr><th>#</th><th>Date</th><th>Route</th><th>Type</th><th>km</th><th>Winner</th><th>GC Leader</th></tr></thead>
      <tbody>${D.stages.map(s=>`<tr>
        <td><strong>${s.n}</strong></td>
        <td style="color:var(--mu);font-size:11px">${s.date.slice(5)}</td>
        <td style="font-size:12px">${s.start} → ${s.end}</td>
        <td>${stBadge(s.type)}</td>
        <td style="color:var(--mu)">${s.dist||'—'}</td>
        <td>${s.winner?`<strong>${s.winner}</strong>`:'<span style="color:var(--mu)">TBC</span>'}</td>
        <td>${s.gcLeader?`<span class="badge b-pk">${s.gcLeader}</span>`:'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>
  `;
  setTimeout(()=>{
    const ctx=document.getElementById('teamWinsChart');
    if(!ctx)return;
    charts.teamWins=new Chart(ctx,{type:'bar',data:{labels:sorted.map(t=>t[0].replace('Visma | Lease a Bike','Visma').replace('Soudal Quick-Step','Soudal QS').replace('UAE Team Emirates XRG','UAE').replace('Netcompany Ineos','Ineos').replace('EF Education-EasyPost','EF').replace('Red Bull-BORA-Hansgrohe','Red Bull')),datasets:[{label:'Wins',data:sorted.map(t=>t[1]),backgroundColor:COLORS,borderRadius:5}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:var_mu()},grid:{color:'rgba(42,58,88,.3)'}},y:{ticks:{color:var_mu(),stepSize:1},grid:{color:'rgba(42,58,88,.3)'}}}}});
  },50);
}
function var_mu(){return '#8892a4';}

// ── STAGES ──
function renderStages(){
  const opts=D.stages.filter(s=>s.winner).map(s=>`<option value="${s.n}">Stage ${s.n} — ${s.start} › ${s.end} (${s.type})</option>`).join('');
  document.getElementById('page-stages').innerHTML=`
    <div class="filter-bar"><label>Select Stage</label><select id="stgSel" onchange="renderStageDetail()">${opts}</select></div>
    <div id="stgDetail"></div>
    <div class="sec" style="margin-top:24px">Top 30 GC Gap — After Stage 20</div>
    <div class="note">Gap in seconds behind Jonas Vingegaard. Horizontal bars show all 30 classified riders.</div>
    <div class="card"><canvas id="gcGap30Chart" height="520"></canvas></div>
  `;
  renderStageDetail();
  setTimeout(buildGap30Chart,50);
}

function buildGap30Chart(){
  const ctx=document.getElementById('gcGap30Chart');
  if(!ctx)return;
  const data=D.gc.slice(0,30);
  charts.gap30=new Chart(ctx,{
    type:'bar',
    data:{
      labels:data.map(r=>`#${r.pos} ${r.rider}`),
      datasets:[{
        label:'Gap (seconds)',
        data:data.map(r=>r.timeGapSec),
        backgroundColor:data.map((_,i)=>i===0?'rgba(232,24,93,.8)':i<3?'rgba(24,100,232,.7)':i<5?'rgba(24,168,107,.6)':'rgba(136,146,164,.4)'),
        borderRadius:4,
      }]
    },
    options:{
      indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`Gap: ${secToMin(v.raw)} (${v.raw}s)`}}},
      scales:{
        x:{ticks:{color:var_mu(),callback:v=>secToMin(v)},grid:{color:'rgba(42,58,88,.3)'},title:{display:true,text:'Gap to Leader (mm:ss)',color:var_mu()}},
        y:{ticks:{color:var_mu(),font:{size:11}},grid:{display:false}},
      }
    }
  });
}

function renderStageDetail(){
  const n=parseInt(document.getElementById('stgSel').value);
  const s=D.stages.find(x=>x.n===n);
  const hasTop=(s.top10&&s.top10.length>0);
  document.getElementById('stgDetail').innerHTML=`
    <div class="g4">
      <div class="kpi" style="--ac:var(--pk)"><div class="kpi-label">Winner</div><div class="kpi-val" style="font-size:16px">${s.winner||'TBC'}</div><div class="kpi-sub">${s.winTeam||''}</div></div>
      <div class="kpi" style="--ac:var(--bl)"><div class="kpi-label">Route</div><div class="kpi-val" style="font-size:13px">${s.start} → ${s.end}</div><div class="kpi-sub">${s.dist||'?'} km · ${stBadge(s.type)}</div></div>
      <div class="kpi" style="--ac:var(--gr)"><div class="kpi-label">GC Leader After</div><div class="kpi-val" style="font-size:18px">${s.gcLeader||'—'}</div></div>
      <div class="kpi" style="--ac:var(--or)"><div class="kpi-label">Avg Speed</div><div class="kpi-val">${s.avgSpeed?s.avgSpeed+' km/h':'—'}</div></div>
    </div>
    ${s.note?`<div class="note" style="background:rgba(24,100,232,.1);border-color:rgba(24,100,232,.3);color:#7ab4ff">📋 ${s.note}</div>`:''}
    ${hasTop?`
    <div class="g2">
      <div class="card">
        <h3>Stage ${n} Top 10</h3><div class="sub">${s.start} → ${s.end}</div>
        <table><thead><tr><th>Pos</th><th>Rider</th><th>Team</th><th>Time</th></tr></thead>
        <tbody>${s.top10.map(r=>`<tr>
          <td><strong style="color:${r.pos<=3?'var(--pk)':'var(--tx)'}">${r.pos}</strong></td>
          <td>${r.nat} ${r.rider}</td>
          <td style="color:var(--mu);font-size:11px">${r.team}</td>
          <td style="font-weight:600">${r.time}</td>
        </tr>`).join('')}</tbody></table>
      </div>
      <div class="card"><h3>Stage Gap Chart</h3><div class="sub">Top 10 time gap to winner (seconds)</div>
        <canvas id="stagegapChart" height="260"></canvas>
      </div>
    </div>`:`<div class="card"><p style="color:var(--mu);font-size:13px">Detailed top-10 available for stages 1, 14, 18, 19, 20.</p></div>`}
  `;
  if(hasTop){
    setTimeout(()=>{
      const ctx=document.getElementById('stagegapChart');
      if(!ctx)return;
      const gaps=s.top10.map(r=>{
        if(r.time==='s.t.'||r.time==='Leader')return 0;
        const m=r.time.match(/\+(\d+):(\d+)/);
        return m?parseInt(m[1])*60+parseInt(m[2]):0;
      });
      new Chart(ctx,{type:'bar',data:{labels:s.top10.map(r=>r.rider.split(' ').pop()),datasets:[{label:'Gap (s)',data:gaps,backgroundColor:COLORS,borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:var_mu(),font:{size:10}},grid:{display:false}},y:{ticks:{color:var_mu(),callback:v=>v+'s'},grid:{color:'rgba(42,58,88,.3)'}}}}});
    },50);
  }
}

// ── GC EVOLUTION ──
let gcSelected=['Vingegaard','Gall','Hindley','Arensman','Eulálio'];
function renderGC(){
  const riders=Object.keys(D.gcHistory.riders);
  document.getElementById('page-gc').innerHTML=`
    <div class="sec">GC Gap Evolution — Stages 1–${D.race.completedStages}</div>
    <div class="note">Select up to 5 riders to compare. Gap in seconds behind race leader.</div>
    <div class="card" style="margin-bottom:18px">
      <div class="picker-label">Select riders to compare <span class="picker-note">(max 5)</span></div>
      <div class="rider-picker" id="gcPicker">

function toggleGCRider(name,el){
  const idx=gcSelected.indexOf(name);
  if(idx>-1){gcSelected.splice(idx,1);el.classList.remove('selected');el.style.background='';el.style.borderColor='';}
  else if(gcSelected.length<5){
    gcSelected.push(name);
    const ci=Object.keys(D.gcHistory.riders).indexOf(name)%COLORS.length;
    el.classList.add('selected');el.style.background=COLORS[ci];el.style.borderColor=COLORS[ci];
  }
  buildGCCharts();
}
function buildGCCharts(){
  if(charts.gcEvo){charts.gcEvo.destroy();}
  if(charts.gcBar){charts.gcBar.destroy();}
  const labels=D.gcHistory.labels.slice(0,D.race.completedStages);
  const datasets=gcSelected.map((name,si)=>{
    const gaps=D.gcHistory.riders[name]||[];
    return{label:name,data:gaps.slice(0,D.race.completedStages).map(v=>v===null?null:-v),borderColor:COLORS[si%COLORS.length],backgroundColor:'transparent',tension:.3,pointRadius:3,spanGaps:false,borderWidth:2};
  });
  const ctx=document.getElementById('gcEvoChart');
  if(ctx)charts.gcEvo=new Chart(ctx,{type:'line',data:{labels,datasets},options:{plugins:{legend:{labels:{color:'#e8eaf0',font:{size:11}}}},scales:{x:{ticks:{color:var_mu()},grid:{color:'rgba(42,58,88,.3)'}},y:{ticks:{color:var_mu(),callback:v=>`${Math.abs(v)}s`},grid:{color:'rgba(42,58,88,.3)'}}},interaction:{mode:'index',intersect:false}}});
  const ctx2=document.getElementById('gcBarChart');
  if(ctx2)charts.gcBar=new Chart(ctx2,{type:'bar',data:{labels:D.gc.slice(1,10).map(r=>r.rider.split(' ').pop()),datasets:[{label:'Gap (s)',data:D.gc.slice(1,10).map(r=>r.timeGapSec),backgroundColor:'rgba(24,100,232,.7)',borderRadius:5}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:var_mu(),callback:v=>secToMin(v)},grid:{color:'rgba(42,58,88,.3)'}},y:{ticks:{color:var_mu(),font:{size:11}},grid:{display:false}}}}});
}

function filterRiders(){
  const s=(document.getElementById('rSearch').value||'').toLowerCase();
  const tm=document.getElementById('rTeam').value;
  const r=document.getElementById('rRole').value;
  const st=document.getElementById('rStatus').value;
  const filtered=RIDERS.filter(x=>{
    if(s&&!x.name.toLowerCase().includes(s)) return false;
    if(tm&&x.team!==tm) return false;
    if(r&&!x.role.includes(r)) return false;
    if(st==='active'&&x.withdrawn) return false;
    if(st==='withdrawn'&&!x.withdrawn) return false;
    return true;
  }).sort((a,b)=>a.bib-b.bib);
  document.getElementById('rGrid').innerHTML=buildRiderCards(filtered);
  loadRiderPhotos();
}
function buildRiderCards(list){
  if(!list.length) return '<p style="color:var(--mu);padding:20px">No riders match your filters.</p>';
  return list.map((r,i)=>`
    <div class="r-card" style="opacity:${r.withdrawn?0.6:1}">
      ${r.withdrawn?`<div style="background:rgba(232,24,93,.15);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--pk);font-weight:700;margin-bottom:8px;display:inline-block">❌ WITHDRAWN</div>`:''}
      <div class="r-hd">
        <div class="r-av" id="av-${r.bib}" style="background:${COLORS[i%COLORS.length]}33;color:${COLORS[i%COLORS.length]}">${r.flag}</div>
        <div>
          <div class="r-name">${r.name}</div>
          <div class="r-team" style="font-size:10px">${r.team}</div>
          <span class="badge b-gy" style="margin-top:3px;display:inline-block;font-size:9px">${r.role}</span>
        </div>
      </div>
      <div class="r-stats">
        <div class="r-stat"><div class="r-stat-l">Age</div><div class="r-stat-v">${r.age}</div></div>
        <div class="r-stat"><div class="r-stat-l">Height</div><div class="r-stat-v">${r.height}</div></div>
        <div class="r-stat"><div class="r-stat-l">Weight</div><div class="r-stat-v">${r.weight}</div></div>
      </div>
      <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
        <span class="badge b-gy" style="font-size:9px">Bib ${r.bib}</span>
        ${r.gcPos?`<span class="badge b-pk">GC #${r.gcPos}</span>`:''}
        ${r.stageWins?`<span class="badge b-gr">🏁 ${r.stageWins} win${r.stageWins>1?'s':''}</span>`:''}
      </div>
      <div class="r-tours">
        <div class="r-tours-l">Grand Tour Experience</div>
        ${r.tourExp.TdF&&r.tourExp.TdF!=='—'?`<div style="margin-bottom:2px;font-size:11px"><strong style="color:var(--tx)">TdF:</strong> <span style="color:var(--mu)">${r.tourExp.TdF}</span></div>`:''}
        ${r.tourExp.Giro?`<div style="margin-bottom:2px;font-size:11px"><strong style="color:var(--pk)">Giro:</strong> <span style="color:var(--mu)">${r.tourExp.Giro}</span></div>`:''}
        ${r.tourExp.Vuelta&&r.tourExp.Vuelta!=='—'?`<div style="font-size:11px"><strong style="color:var(--or)">Vuelta:</strong> <span style="color:var(--mu)">${r.tourExp.Vuelta}</span></div>`:''}
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--mu);font-style:italic">${r.bio}</div>
    </div>`).join('');
}
async function loadRiderPhotos(){
  const visible=document.querySelectorAll('[id^="av-"]');
  for(const el of visible){
    if(el.querySelector('img')) continue;
    const bib=parseInt(el.id.replace('av-',''));
    const rider=RIDERS.find(r=>r.bib===bib);
    if(!rider||!rider.wikiSlug) continue;
    try{
      const res=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${rider.wikiSlug}`);
      if(!res.ok) continue;
      const data=await res.json();
      if(data.thumbnail&&data.thumbnail.source){
        const img=document.createElement('img');
        img.src=data.thumbnail.source;
        img.alt=rider.name;
        img.onerror=()=>img.remove();
        el.innerHTML='';
        el.appendChild(img);
      }
    }catch(e){}
  }
}

function filterPower(){
